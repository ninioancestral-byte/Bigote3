<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
}

.container{
display:flex;
height:100vh;
}

.video{
flex:3;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
border-left:1px solid #333;
background:#181818;
}

video{
width:90%;
max-width:900px;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
margin-bottom:8px;
}

.input{
border:none;
padding:12px;
background:#222;
color:white;
font-size:16px;
outline:none;
}

</style>

</head>

<body>

<div class="container">

<div class="video">
<video id="video" controls autoplay></video>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<input
id="chatInput"
class="input"
placeholder="Escribe un mensaje..."
/>

</div>

</div>

<script>
const { createClient } = supabase

const supabaseClient = createClient(
"https://sujppiucdbfjfjlddegt.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1anBwaXVjZGJmamZqbGRkZWd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDkwMjMsImV4cCI6MjA4ODU4NTAyM30.wHF8qkpLIOn85nmqmtMygHQwkwKFOBo3MNjpqsDUypA"
)
const playbackId = "7n01hqYvo3zuQfFKBo02w1r6WSD102TMggq2Egd7xoa02vQ"

const video = document.getElementById("video")

const videoSrc = "https://stream.mux.com/" + playbackId + ".m3u8"

if(Hls.isSupported()){

const hls = new Hls()
hls.loadSource(videoSrc)
hls.attachMedia(video)

}
else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src = videoSrc

}

const input = document.getElementById("chatInput")
const messages = document.getElementById("messages")
supabaseClient
.channel("chat-room")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"bigote-stream"
},
(payload)=>{

const msg = payload.new

const div = document.createElement("div")
div.className = "message"
div.textContent = msg.username + ": " + msg.message

messages.appendChild(div)

messages.scrollTop = messages.scrollHeight

}
)
.subscribe()
input.addEventListener("keydown", async function(e){

if(e.key === "Enter"){

const text = input.value.trim()

if(text === "") return

const { data, error } = await supabaseClient
.from("bigote-stream")
.insert([{ username:"user", message:text }])

console.log("supabase response:", data, error)


messages.scrollTop = messages.scrollHeight

input.value = ""

}

})

</script>

</body>
</html>
