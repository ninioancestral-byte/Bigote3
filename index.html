<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body style="background:black; display:flex; justify-content:center; align-items:center; height:100vh;">

<video id="video" controls autoplay style="width:900px;"></video>

<script>

const playbackId = "PON_AQUI_TU_PLAYBACK_ID"

const video = document.getElementById("video")

const videoSrc = "https://stream.mux.com/" + playbackId + ".m3u8"

if (Hls.isSupported()) {

const hls = new Hls()
hls.loadSource(videoSrc)
hls.attachMedia(video)

} 
else if (video.canPlayType("application/vnd.apple.mpegurl")) {

video.src = videoSrc

}

</script>

</body>
</html>
